<!DOCTYPE html>
<html>
<head>
    <title>Hi bebu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            background: #ffe1fa; 
            overflow-x: hidden; /* Prevents horizontal scroll from hearts */
            position: relative;
        }

        .cute-font-regular {
          font-family: "Cute Font", sans-serif;
          font-weight: 400;
          font-style: normal;
          font-size: 60px; 
        }

        /* --- THE TRANSLUCENT BOX --- */
        .title-container {
            background: rgba(255, 255, 255, 0.45); 
            padding: 15px 40px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 25px;
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(255, 106, 255, 0.1);
        }

        #title {
            margin: 0;
            color: #ff47ff; /* A slightly darker pink for contrast */
            line-height: 1.2;
        }

        #content-box { 
            background: rgba(255, 255, 255, 0.85); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            max-width: 850px;
            margin: auto;
            position: relative;
            z-index: 10; /* Keeps the app above the floating hearts */
        }

        button { 
            font-family: "Cute Font", sans-serif;
            font-size: 26px;
            padding: 12px 25px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 15px; 
            border: none; 
            background: #ff6aff; 
            color: white; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            background: #ff47ff;
            transform: scale(1.1) rotate(2deg);
        }

        iframe { 
            width: 100%; 
            height: 450px; 
            border-radius: 15px;
            border: none; 
            margin-top: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* --- FLOATING HEARTS ANIMATION --- */
        .heart {
            position: fixed;
            bottom: -100px;
            font-size: 20px;
            color: rgba(255, 106, 255, 0.3);
            user-select: none;
            z-index: 1;
            animation: floatUp 10s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="heart-bg"></div>

    <div id="content-box">
        <div class="title-container">
            <h1 id="title" class="cute-font-regular">How do you feel today?</h1>
        </div>
        
        <div id="video-container"></div>
        
        <div id="button-grid">
            <button onclick="loadContent(0)">Miss na kita</button>
            <button onclick="loadContent(1)">Galit ako sayo</button>
            <button onclick="loadContent(2)">Mahal kita today</button>
            <button onclick="loadContent(3)">Im sad</button>
            <button onclick="loadContent(4)">I'm stressed/Galit ako sa mundo</button>
        </div>
    </div>

    <script>
        // Function to create floating hearts in the background
        function createHearts() {
            const heartContainer = document.getElementById('heart-bg');
            const heartIcons = ['❤️', '💖', '🌸', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
                heart.style.fontSize = (Math.random() * 20 + 10) + "px";
                
                heartContainer.appendChild(heart);
                
                setTimeout(() => { heart.remove(); }, 10000);
            }, 800);
        }

        async function loadContent(index) {
            try {
                // Fetching the database file
                const response = await fetch('database.json'); 
                
                if (!response.ok) {
                    alert("Can't find database.json!");
                    return;
                }

                const data = await response.json();
                const item = data[index];

                if (item) {
                    document.getElementById('title').innerText = item.title;
                    document.getElementById('description').innerText = item.text;
                    document.getElementById('video-container').innerHTML = 
                        `<iframe src="${item.videoUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                    
                    // Small effect: make the title bounce when content loads
                    const titleBox = document.querySelector('.title-container');
                    titleBox.style.transform = "scale(1.1)";
                    setTimeout(() => { titleBox.style.transform = "scale(1)"; }, 300);
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // Start hearts when page loads
        window.onload = createHearts;
    </script>
</body>
</html>
